services:

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantdash}
      POSTGRES_DB: ${POSTGRES_DB:-quantdash}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - quantdash-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - quantdash-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./backend/ml_models:/app/ml_models
    networks:
      - quantdash-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A worker worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./backend/ml_models:/app/ml_models
    networks:
      - quantdash-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    networks:
      - quantdash-net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - quantdash-net
    depends_on:
      - backend
      - frontend

volumes:
  postgres-data:

networks:
  quantdash-net:
    driver: bridge
