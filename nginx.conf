##############################################################################
# QuantDash — Nginx Reverse Proxy Config
#
# Routes:
#   /          → Next.js  (port 3000)  — frontend
#   /api/      → FastAPI  (port 8000)  — REST + SSE
#   /api/live/ws/  → FastAPI (port 8000) — WebSocket (live market data)
##############################################################################

server {
    listen 80;
    server_name quantdash.saurav-info.xyz 204.168.154.171 _;   # accepts any hostname / IP

    # ── Increase timeouts for SSE streams (data download, ML training) ───────
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout  10s;

    # ── Pass real client IP to backend ──────────────────────────────────────
    proxy_set_header  X-Real-IP        $remote_addr;
    proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header  Host             $host;

    # ── WebSocket: Live market data (/api/live/ws/*) ─────────────────────────
    # Must come BEFORE the generic /api/ block
    location /api/live/ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;    # keep WS alive for 1h
    }

    # ── FastAPI REST + SSE (/api/*) ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_buffering    off;              # CRITICAL: SSE won't work with buffering on
        proxy_cache        off;
        proxy_read_timeout 600s;
    }

    # ── Next.js frontend (everything else) ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_buffering    off;
    }
}
